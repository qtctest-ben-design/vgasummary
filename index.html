<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華碩 VGA 產品輿情監控系統</title>
    <!-- 引入外部資源：順序重要，React -> PropTypes -> Recharts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { margin: 0; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            PieChart, Pie, Cell, Legend 
        } = window.Recharts;

        // 使用 SVG 代替 Lucide 組件，避免庫加載不全導致的 Error #130
        const Icon = ({ name, color = "currentColor", size = 24 }) => {
            const paths = {
                TrendingUp: "M22 7l-8.5 8.5-5-5L2 17M16 7h6v6",
                AlertCircle: "M12 8v4M12 16h.01M22 12c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10z",
                Share2: "M18 8a3 3 0 100-6 3 3 0 000 6zM6 15a3 3 0 100-6 3 3 0 000 6zM18 22a3 3 0 100-6 3 3 0 000 6zM8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98",
                ExternalLink: "M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3",
                RefreshCw: "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
                Database: "M12 3c-4.97 0-9 1.79-9 4s4.03 4 9 4 9-1.79 9-4-4.03-4-9-4z M12 11c-4.97 0-9 1.79-9 4s4.03 4 9 4 9-1.79 9-4-4.03-4-9-4 M12 19c-4.97 0-9 1.79-9 4s4.03 4 9 4 9-1.79 9-4-4.03-4-9-4",
                ShieldAlert: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z M12 8v4 M12 16h.01",
                MessageCircle: "M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d={paths[name] || ""} />
                </svg>
            );
        };

        const App = () => {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [filter, setFilter] = React.useState('全部');
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('./articles_data.json');
                        if (!response.ok) throw new Error(`找不到數據檔案 (HTTP ${response.status})`);
                        const jsonData = await response.json();
                        setData(Array.isArray(jsonData) ? jsonData : []);
                    } catch (e) {
                        setError(e.message);
                        setData([
                            { "source": "系統提示", "title": "請確認 articles_data.json 格式與路徑正確", "category": "資訊分享", "date": "N/A", "link": "#" }
                        ]);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            const total = data.length;
            const complaints = data.filter(d => d.category === '客訴').length;
            const shares = data.filter(d => d.category === '資訊分享').length;
            const complaintRate = total > 0 ? ((complaints / total) * 100).toFixed(1) : 0;

            const pieData = [
                { name: '客訴', value: complaints, color: '#ef4444' },
                { name: '資訊分享', value: shares, color: '#3b82f6' }
            ];

            const sourceData = [
                { name: 'Mobile01', count: data.filter(d => d.source === 'Mobile01').length },
                { name: '巴哈姆特', count: data.filter(d => d.source === 'Bahamut').length }
            ];

            const filteredData = filter === '全部' ? data : data.filter(d => d.category === filter);

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-slate-950 text-white font-sans">
                        <div className="text-center">
                            <div className="animate-spin mb-4 inline-block"><Icon name="RefreshCw" color="#3b82f6" size={40} /></div>
                            <p className="text-lg font-medium">正在載入輿情數據...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 text-slate-200 p-4 md:p-8 font-sans">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-white tracking-tight flex items-center gap-3">
                                    <Icon name="TrendingUp" color="#60a5fa" />
                                    華碩 VGA 產品輿情監控系統
                                </h1>
                                <p className="text-slate-400 mt-1">即時分析論壇趨勢與客訴狀況</p>
                            </div>
                            <div className="flex items-center gap-4 bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-xl">
                                <div className="text-right">
                                    <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none mb-1">目前客訴率</div>
                                    <div className={`text-2xl font-black ${complaintRate > 40 ? 'text-red-500' : 'text-green-400'}`}>
                                        {complaintRate}%
                                    </div>
                                </div>
                                <div className={`p-2 rounded-full ${complaintRate > 40 ? 'bg-red-500/20 text-red-500' : 'bg-green-500/20 text-green-500'}`}>
                                    <Icon name="ShieldAlert" size={32} />
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            {[
                                { label: '總監測篇數', val: total, icon: 'Database', color: '#60a5fa' },
                                { label: '客訴總數', val: complaints, icon: 'AlertCircle', color: '#f87171' },
                                { label: '資訊分享', val: shares, icon: 'Share2', color: '#4ade80' },
                                { label: '平台數量', val: '2', icon: 'MessageCircle', color: '#c084fc' }
                            ].map((card, i) => (
                                <div key={i} className="bg-slate-900 border border-slate-800 p-6 rounded-3xl">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-slate-500 text-xs font-bold mb-1 uppercase tracking-wider">{card.label}</p>
                                            <p className="text-3xl font-black text-white">{card.val}</p>
                                        </div>
                                        <Icon name={card.icon} color={card.color} size={28} />
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-xl">
                                <h3 className="text-sm font-bold text-slate-400 mb-6 flex items-center gap-2">
                                    <div className="w-1.5 h-4 bg-blue-500 rounded-full" /> 輿情意圖分析
                                </h3>
                                <div className="h-72">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={pieData} innerRadius={70} outerRadius={95} paddingAngle={5} dataKey="value">
                                                {pieData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                ))}
                                            </Pie>
                                            <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '12px' }} />
                                            <Legend verticalAlign="bottom" />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-xl">
                                <h3 className="text-sm font-bold text-slate-400 mb-6 flex items-center gap-2">
                                    <div className="w-1.5 h-4 bg-purple-500 rounded-full" /> 來源平台分佈
                                </h3>
                                <div className="h-72">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={sourceData}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                            <XAxis dataKey="name" stroke="#64748b" fontSize={12} tickLine={false} axisLine={false} />
                                            <YAxis stroke="#64748b" fontSize={12} tickLine={false} axisLine={false} />
                                            <Tooltip cursor={{fill: '#1e293b'}} contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '12px' }} />
                                            <Bar dataKey="count" fill="#8b5cf6" radius={[6, 6, 0, 0]} barSize={50} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-900 border border-slate-800 rounded-3xl shadow-xl overflow-hidden">
                            <div className="p-6 border-b border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4">
                                <h3 className="text-lg font-bold text-white flex items-center gap-2">
                                    <Icon name="Database" color="#3b82f6" size={20} />
                                    監測數據列表
                                </h3>
                                <div className="flex bg-slate-800 p-1 rounded-xl">
                                    {['全部', '客訴', '資訊分享'].map(t => (
                                        <button
                                            key={t}
                                            onClick={() => setFilter(t)}
                                            className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${
                                                filter === t ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200'
                                            }`}
                                        >
                                            {t}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="divide-y divide-slate-800 max-h-[600px] overflow-y-auto custom-scrollbar">
                                {filteredData.length > 0 ? (
                                    filteredData.map((item, idx) => (
                                        <div key={idx} className="p-5 hover:bg-slate-800/50 transition-colors group">
                                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-tighter ${
                                                            item.source === 'Mobile01' ? 'bg-green-500/10 text-green-500 border border-green-500/20' : 'bg-blue-500/10 text-blue-500 border border-blue-500/20'
                                                        }`}>
                                                            {item.source}
                                                        </span>
                                                        <span className={`text-[10px] font-black px-2 py-0.5 rounded flex items-center gap-1 border ${
                                                            item.category === '客訴' ? 'bg-red-500/10 text-red-500 border-red-500/20' : 'bg-cyan-500/10 text-cyan-500 border-cyan-500/20'
                                                        }`}>
                                                            <Icon name={item.category === '客訴' ? 'AlertCircle' : 'Share2'} size={10}/>
                                                            {item.category}
                                                        </span>
                                                        <span className="text-slate-600 text-[10px] font-mono">{item.date}</span>
                                                    </div>
                                                    <h4 className="text-slate-200 font-bold leading-snug group-hover:text-blue-400 transition-colors">
                                                        {item.title}
                                                    </h4>
                                                </div>
                                                <a href={item.link} target="_blank" rel="noopener noreferrer" className="bg-slate-800 hover:bg-blue-600 text-slate-300 hover:text-white p-2.5 rounded-xl transition-all shadow-lg flex items-center justify-center">
                                                    <Icon name="ExternalLink" size={18} />
                                                </a>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="p-20 text-center text-slate-600 italic">無相符的數據。</div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
